version: 2

sources:
  - name: raw
    description: "Raw tables loaded directly by our Python load.py script"
    schema: public
    tables:
      - name: raw_crypto_prices
        description: "Append-only history of crypto market snapshots pulled from CoinGecko"
        columns:
          - name: coin_id
            description: "Unique identifier for the coin, e.g. 'bitcoin'"
          - name: price_usd
            description: "Current price in USD at time of extraction"
          - name: extracted_at
            description: "Timestamp of the pipeline run that produced this row"
