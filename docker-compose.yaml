# Minimal local Airflow setup (LocalExecutor).
# This runs entirely on your machine - completely free, no cloud
# Airflow service needed. It uses its own tiny Postgres container
# just to store Airflow's internal metadata (task history, schedules)
# - this is SEPARATE from your Supabase warehouse, which is where
# your actual crypto data lives.

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas requests sqlalchemy psycopg2-binary python-dotenv dbt-core dbt-postgres"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./dbt_crypto:/opt/airflow/dbt_crypto
    - ./.env:/opt/airflow/.env
  depends_on:
    - airflow-metadata-db

services:
  airflow-metadata-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Shiwani --lastname Verma --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  airflow_db_data:
